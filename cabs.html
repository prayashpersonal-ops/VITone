<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Coming Soon</title>

  <style>
    .btn, .card, nav ul li {
  -webkit-user-select: none;
  user-select: none;
}

button, .card {
  -webkit-tap-highlight-color: transparent;
}
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      text-align: center;
      color: #9ca3af;
    }

    .main-text {
      font-size: 18px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .sub-text {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .btn {
      padding: 8px 16px;
      font-size: 13px;
      color: #9ca3af;
      background: transparent;
      border: 1px solid #374151;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1e293b;
      color: white;
    }
    @media (max-width: 600px) {

  .main-text {
    font-size: 26px;
  }

  .sub-text {
    font-size: 18px;
  }

  .btn {
    font-size: 16px;
    padding: 12px 22px;
  }

}
  </style>
  
</head>

<body>

  <div class="container">
    <div class="main-text">
      This service will be available soon.
    </div>
    <div class="sub-text">
      We’re working on it. Stay tuned.
    </div>

    <button class="btn" onclick="goBack()">← Go Back</button>
  </div>

  <script>
    function goBack() {
      window.history.back();
    }

  </script>

</body>
</html>
